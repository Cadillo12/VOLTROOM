name: VoltRoom CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: voltroom-backend

    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn clean package -DskipTests
    - name: Run Tests
      run: mvn test

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: voltroom-frontend

    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js 20
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: voltroom-frontend/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Build Frontend
      run: npm run build
