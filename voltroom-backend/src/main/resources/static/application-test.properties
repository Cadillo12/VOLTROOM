# ── Servidor ──
server.port=8080

# ── PostgreSQL ──
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/voltroom_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:@123@q}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── HikariCP ──
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Logging ──
logging.level.root=INFO
logging.level.com.voltroom=DEBUG
logging.file.name=logs/voltroom.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ── JWT Config ──
jwt.secret=${JWT_SECRET:8VfQ3+N5d8R5xP1s3VfQ3+N5d8R5xP1s3VfQ3+N5d8R5xP1s}
jwt.expiration=${JWT_EXPIRATION:3600000}

# ── Swagger / OpenAPI ──
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
