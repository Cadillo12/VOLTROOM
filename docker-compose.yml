version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: voltroom_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-@123@q}
      POSTGRES_DB: voltroom_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - voltroom_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./voltroom-backend
      dockerfile: Dockerfile
    container_name: voltroom_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/voltroom_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD:-@123@q}
      - JWT_SECRET=${JWT_SECRET:-8VfQ3+N5d8R5xP1s3VfQ3+N5d8R5xP1s3VfQ3+N5d8R5xP1s}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - voltroom_network

  frontend:
    build:
      context: ./voltroom-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080/api
    container_name: voltroom_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - voltroom_network

volumes:
  pgdata:

networks:
  voltroom_network:
    driver: bridge
